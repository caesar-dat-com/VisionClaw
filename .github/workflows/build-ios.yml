name: Build VisionClaw — Ares Mode (no Gemini)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write Secrets.swift
        run: |
          cat > samples/CameraAccess/CameraAccess/Secrets.swift << 'EOF'
          import Foundation
          enum Secrets {
            static let geminiAPIKey         = ""
            static let openClawHost         = "http://100.111.183.96"
            static let openClawPort         = 18889
            static let openClawHookToken    = "${{ secrets.OPENCLAW_GATEWAY_TOKEN }}"
            static let openClawGatewayToken = "${{ secrets.OPENCLAW_GATEWAY_TOKEN }}"
            static let webrtcSignalingURL   = ""
          }
          EOF

      - name: Build archive (unsigned)
        run: |
          cd samples/CameraAccess
          set -o pipefail
          xcodebuild \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/CameraAccess.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_SWIFT_FLAGS="-Xfrontend -debug-constraints" \
            2>&1 | tee /tmp/xcodebuild.log
          echo "--- ERRORS ---"
          grep -E "error:" /tmp/xcodebuild.log || echo "(no error: lines found)"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: /tmp/xcodebuild.log
          retention-days: 3

      - name: Package IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          APP=$(find $RUNNER_TEMP/CameraAccess.xcarchive -name "*.app" | head -1)
          cp -r "$APP" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP && zip -r VisionClaw-Ares.ipa Payload/
          echo "IPA: $(du -sh VisionClaw-Ares.ipa)"

      - uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-Ares
          path: ${{ runner.temp }}/VisionClaw-Ares.ipa
          retention-days: 14
